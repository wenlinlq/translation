<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>音频翻译 · 百度智能云</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="container">
    <header>
      <h1>音频识别 · 翻译 · 语音合成</h1>
      <p class="subtitle">Node.js 后端 · 百度 ASR / MT / TTS</p>
    </header>

    <section class="card">
      <label class="label">本地音频（WAV / MP3）</label>
      <div class="file-row">
        <input type="file" id="audioFile" accept=".wav,.mp3,audio/wav,audio/mpeg" />
        <span id="fileName" class="hint">未选择文件</span>
      </div>

      <div class="lang-row">
        <label>
          源语言
          <select id="sourceLang">
            <option value="zh" selected>中文</option>
            <option value="en">英语</option>
            <option value="jp">日语</option>
            <option value="kor">韩语</option>
          </select>
        </label>
        <label>
          目标语言
          <select id="targetLang">
            <option value="en" selected>英语</option>
            <option value="zh">中文</option>
            <option value="jp">日语</option>
            <option value="kor">韩语</option>
            <option value="fra">法语</option>
            <option value="de">德语</option>
          </select>
        </label>
      </div>

      <button id="btnProcess" type="button" class="primary">开始处理</button>
    </section>

    <section class="card">
      <h2>识别原文</h2>
      <pre id="originalText" class="result">—</pre>
    </section>

    <section class="card">
      <h2>译文</h2>
      <pre id="translatedText" class="result">—</pre>
    </section>

    <section class="card">
      <h2>输出文件</h2>
      <ul id="outputLinks" class="links">
        <li class="hint">处理完成后显示下载链接</li>
      </ul>
    </section>

    <section class="card">
      <h2>运行日志</h2>
      <pre id="runLog" class="log"></pre>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
